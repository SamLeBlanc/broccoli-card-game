<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broccoli</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Join screen -->
<div id="join-screen">
  <div class="join-box">
    <div class="join-title">
      <img class="join-logo" src="/broccoli.png" alt="Broccoli logo" />
      <h1>Broccoli</h1>
    </div>
    <label>Your name</label>
    <input id="player-name" type="text" placeholder="e.g. Sam" maxlength="20" />
    <label>Play mode</label>
    <div class="mode-row">
      <button class="mode-btn active" data-mode="host">Host</button>
      <button class="mode-btn" data-mode="join">Join</button>
    </div>
    <div id="host-options">
      <label>Room code <span class="sublabel">(share with friends)</span></label>
      <input id="room-id-host" type="text" placeholder="e.g. mygame" maxlength="20" />
      <label>Number of players</label>
      <div class="player-count-row">
        <button class="count-btn active" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
      </div>
    </div>
    <div id="join-options" class="hidden">
      <label>Room code</label>
      <input id="room-id-join" type="text" placeholder="enter room code" maxlength="20" />
    </div>
    <button id="join-btn">Host Table</button>
    <button id="btn-debug" style="display:none">🐛 Debug — 4 players, auto-deal</button>
  </div>
</div>

<!-- Game screen -->
<div id="game-screen" class="hidden">

  <!-- Top bar -->
  <div id="topbar">
    <img id="title-img" src="/broccoli.png" alt="Game logo" />
    <span id="title">Broccoli</span>
    <span id="player-label"></span>
    <span id="room-label"></span>
    <div id="deck-controls">
      <button id="btn-shuffle">Shuffle</button>
      <button id="btn-draw">Draw to Hand</button>
      <button id="btn-flip-table">Draw Face Up</button>
      <button id="btn-deal">Deal</button>
      <button id="btn-collect">Restack</button>
      <button id="btn-recall">Recall to Hand</button>
      <button id="btn-score" class="hidden">Score</button>
      <button id="btn-rules">Rules</button>
    </div>
  </div>

  <!-- Table area: left hand | center | right sidebar -->
  <div id="table-row">

    <!-- Center: opponents bar + table + your hand -->
    <div id="center-col">

      <!-- All opponents shown as chips across the top -->
      <div id="opp-top" class="opp-top hidden"></div>

      <!-- The actual table surface -->
      <div id="table">
        <div id="deck-pile" title="Click to flip top card to table"></div>
        <div id="select-box"></div>
        <!-- Discard pile — right side of table, cards stack here -->
        <div id="discard-zone" title="Discard pile"></div>
      </div>

      <!-- Your hand -->
      <div id="hand-area">
        <div id="hand-label">
          Your Hand <span id="hand-count">(0)</span>
          <button id="btn-isolate-left"  class="hidden">◀ Isolate</button>
          <button id="btn-isolate-right" class="hidden">Isolate ▶</button>
          <button id="btn-deselect-hand" class="hidden">Deselect</button>
          <button id="btn-discard-hand"  class="hidden">Discard</button>
          <button id="btn-play-selected" class="hidden">Play</button>
          <span id="hand-score-preview" class="hidden"></span>
          <div id="sort-btns">
            <span class="sort-label">Sort by</span>
            <button class="sort-btn" data-sort="rank">Number</button>
            <button class="sort-btn" data-sort="color">Color</button>
            <button class="sort-btn" data-sort="suit">Suit</button>
          </div>
        </div>
        <div id="hand-cards"></div>
      </div>

    </div><!-- /center-col -->

    <!-- Right sidebar: tabbed panels -->
    <div id="right-sidebar">
      <div id="sidebar-resize-handle"></div>

      <!-- Tab strip -->
      <div id="sidebar-tabs">
        <button class="sidebar-tab" data-pane="cheat">Cheat</button>
        <button class="sidebar-tab" data-pane="deck">Deck</button>
        <button class="sidebar-tab active" data-pane="history">History</button>
      </div>

      <!-- Cheat pane -->
      <div id="pane-cheat" class="sidebar-pane hidden">
        <div id="cheat-header">
          <span id="cheat-title">Valid sets in hand</span>
        </div>
        <div id="cheat-list"></div>
      </div>

      <!-- Deck browser pane -->
      <div id="pane-deck" class="sidebar-pane hidden">
        <div id="deck-panel-header">
          <div id="deck-panel-tabs">
            <button class="deck-tab active" data-tab="remaining">Remaining (<span id="deck-remaining-count">0</span>)</button>
            <button class="deck-tab" data-tab="all">All (350)</button>
          </div>
        </div>
        <div id="deck-panel-controls">
          <input id="deck-search" type="text" placeholder="e.g. 13 red spade…" autocomplete="off" />
          <div id="deck-group-btns">
            <span class="deck-group-label">Group</span>
            <button class="deck-group-btn active" data-group="color">Color</button>
            <button class="deck-group-btn" data-group="suit">Suit</button>
            <button class="deck-group-btn" data-group="rank">Number</button>
            <label id="deck-separate-jokers-label">
              <input type="checkbox" id="deck-separate-jokers" checked />
              Jokers
            </label>
          </div>
        </div>
        <div id="deck-panel-content"></div>
      </div>

      <!-- History pane -->
      <div id="pane-history" class="sidebar-pane">
        <div id="history-filter-row" class="hidden">
          <select id="history-player-filter">
            <option value="all">All Players</option>
          </select>
        </div>
        <div id="history-rows"></div>
      </div>

    </div><!-- /right-sidebar -->

  </div><!-- /table-row -->

  <!-- Deal dialog -->
  <div id="deal-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <h2>Deal cards</h2>
      <p id="deal-desc">Deal to all players</p>
      <div class="deal-row">
        <button class="deal-adj" id="deal-minus">−</button>
        <span id="deal-display">5</span>
        <button class="deal-adj" id="deal-plus">+</button>
      </div>
      <p class="deal-sub" id="deal-sub">cards each</p>
      <div class="modal-actions">
        <button id="deal-cancel">Cancel</button>
        <button id="deal-confirm" class="primary">Deal</button>
      </div>
    </div>
  </div>

  <!-- Score result overlay -->
  <div id="score-result" class="score-result hidden"></div>

</div>

<script src="/config.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="cards.js"></script>
<script src="animation.js"></script>
<script src="state.js"></script>
<script src="grid.js"></script>
<script src="scoring-core.js"></script>
<script src="scoring.js"></script>
<script src="hand.js"></script>
<script src="ui.js"></script>
<script src="intro.js"></script>

</body>
</html>
